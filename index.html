<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stem Player</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Circular+Std:wght@400;500;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #121212;
      --surface: #181818;
      --surface2: #282828;
      --surface3: #333333;
      --border: #333333;
      --text: #ffffff;
      --text-muted: #a7a7a7;
      --text-sub: #b3b3b3;
      --accent: #1db954;
      --accent2: #1ed760;
      --accent-dim: rgba(29,185,84,0.15);
      --solo: #f59e0b;
      --track-h: 64px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

    /* ── SHARED ── */
    .screen { display: none; flex-direction: column; min-height: 100vh; }
    .screen.active { display: flex; }

    /* ── LIST SCREEN ── */
    #list-screen {
      align-items: center;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(29,185,84,0.45) 0%, transparent 70%),
        linear-gradient(180deg, #0d2818 0%, #121212 500px);
    }

    /* ── PLAYER SCREEN ── */
    #player-screen {
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(29,185,84,0.3) 0%, transparent 60%),
        #121212;
    }

    .list-header {
      width: 100%;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .site-logo {
      font-size: 22px;
      font-weight: 800;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: -0.5px;
    }

    .list-hero {
      padding: 48px 40px 32px;
      text-align: left;
      width: 100%;
      max-width: 1200px;
    }
    .list-hero h1 {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 800;
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: -1px;
    }
    .list-hero p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }

    .song-grid {
      width: 100%;
      max-width: 1200px;
      padding: 24px 40px 80px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
      gap: 24px;
    }

    .song-card {
      background: var(--surface);
      border: none;
      border-radius: 8px;
      padding: 16px;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .song-card:hover { background: var(--surface2); }

    .song-card-art {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 4px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .song-card-art img { width: 100%; height: 100%; object-fit: cover; }
    .song-card-art-placeholder { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; background: var(--surface3); }
    .song-card-art-placeholder svg { width: 40px; height: 40px; fill: var(--text-muted); }

    .play-overlay {
      position: absolute;
      bottom: 8px; right: 8px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
    }
    .song-card:hover .play-overlay { opacity: 1; transform: translateY(0); }
    .play-overlay-icon {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: #000; font-weight: 900;
      box-shadow: 0 8px 16px rgba(0,0,0,0.5);
    }

    .song-card-title { font-size: 14px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .song-card-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .song-card-tag { background: var(--surface3); border-radius: 4px; padding: 2px 8px; font-size: 11px; color: var(--text-muted); }
    .empty-state { text-align: center; padding: 80px 40px; color: var(--text-muted); font-size: 14px; display: none; }

    /* ── PLAYER SCREEN ── */
    .player-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      gap: 16px;
      background: var(--surface);
    }
    .player-header-logo { font-size: 16px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }
    .player-title-wrap { text-align: center; }
    .player-song-title { font-size: 18px; font-weight: 700; color: var(--text); }
    .player-stem-count { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .back-btn {
      background: var(--surface3);
      border: none;
      color: var(--text);
      border-radius: 20px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .back-btn:hover { background: #404040; }

    /* Transport */
    .transport { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 0 0 16px; }
    .seek-wrapper { width: 100%; display: flex; align-items: center; gap: 12px; }
    .time-label { font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums; white-space: nowrap; min-width: 36px; }
    .seek-bar {
      flex: 1; -webkit-appearance: none; appearance: none;
      height: 4px; border-radius: 2px;
      background: var(--surface3); cursor: pointer;
    }
    .seek-bar::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px;
      border-radius: 50%; background: var(--text); cursor: pointer;
    }
    .seek-bar:hover::-webkit-slider-thumb { background: var(--accent); }
    .transport-btns { display: flex; align-items: center; gap: 12px; }

    /* Master volume */
    .master-vol-wrap { display: flex; align-items: center; gap: 10px; }
    .master-vol-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); white-space: nowrap; }
    .master-vol-bar {
      -webkit-appearance: none; appearance: none;
      width: 120px; height: 4px; border-radius: 2px;
      background: var(--surface3); cursor: pointer;
    }
    .master-vol-bar::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px;
      border-radius: 50%; background: var(--text); cursor: pointer;
    }
    .master-vol-val { font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums; min-width: 32px; }

    .ctrl-btn {
      background: transparent;
      border: 1px solid var(--surface3);
      color: var(--text-muted);
      border-radius: 20px;
      padding: 6px 18px;
      font-size: 12px; font-weight: 700; letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      text-transform: uppercase;
    }
    .ctrl-btn:hover { border-color: var(--text); color: var(--text); }
    .ctrl-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    .play-btn {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--accent);
      border: none; color: #000;
      font-size: 20px; font-weight: 900;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s, background 0.15s;
      box-shadow: 0 4px 16px rgba(29,185,84,0.4);
    }
    .play-btn:hover { transform: scale(1.06); background: var(--accent2); }

    /* 再開オーバーレイ */
    #resume-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px;
    }
    #resume-overlay.hidden { display: none; }
    #resume-overlay p { font-size: 15px; color: var(--text-muted); }
    #resume-btn {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--accent);
      border: none; color: #000; font-size: 28px; font-weight: 900;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 24px rgba(29,185,84,0.5);
    }

    /* Tracks */
    .tracks-area { flex: 1; display: flex; flex-direction: column; gap: 2px; }

    /* 2カラムレイアウト */
    .player-body {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 24px;
      padding: 20px 32px 40px;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      align-items: start;
    }
    .player-left { display: flex; flex-direction: column; gap: 8px; }
    .player-right { display: flex; flex-direction: column; gap: 16px; position: sticky; top: 24px; }

    /* ジャケット */
    .song-jacket {
      width: 100%; aspect-ratio: 1;
      border-radius: 8px; overflow: hidden;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
    }
    .song-jacket img { width: 100%; height: 100%; object-fit: cover; }
    .song-jacket-placeholder { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
    .song-jacket-placeholder svg { width: 48px; height: 48px; fill: var(--text-muted); opacity: 0.4; }

    /* 楽曲説明 */
    .song-description {
      font-size: 13px; color: var(--text-muted);
      line-height: 1.8; white-space: pre-wrap;
    }

    /* リンクボタン */
    .player-links { display: flex; flex-direction: column; gap: 8px; }
    .link-btn {
      display: flex; align-items: center; justify-content: center;
      gap: 7px; border-radius: 4px;
      padding: 12px 16px;
      font-size: 13px; font-weight: 700;
      text-decoration: none;
      border: none;
      background: var(--surface3);
      color: var(--text);
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
      letter-spacing: 0.03em;
    }
    .link-btn:hover { background: #404040; transform: scale(1.01); }
    .link-btn.purchase { background: var(--accent); color: #000; }
    .link-btn.purchase:hover { background: var(--accent2); }
    .link-btn.streaming { background: #1db954; color: #000; }
    .link-btn.streaming:hover { background: #1ed760; }
    .link-btn.youtube { background: #ff0000; color: #fff; }
    .link-btn.instagram { background: #e1306c; color: #fff; }
    .link-btn.twitter { background: #000; color: #fff; border: 1px solid #333; }

    /* Track rows */
    .track-row {
      display: grid;
      grid-template-columns: 140px 1fr auto auto;
      align-items: center;
      gap: 16px;
      background: transparent;
      border: none;
      border-radius: 4px;
      padding: 8px 12px;
      height: var(--track-h);
      transition: background 0.15s, opacity 0.2s;
    }
    .track-row:hover { background: var(--surface2); }
    .track-row.is-muted { opacity: 0.3; }
    .track-row.is-solo { background: rgba(29,185,84,0.08); }
    .track-row.solo-dimmed { opacity: 0.2; }
    .track-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-wave { flex: 1; height: 40px; display: flex; align-items: center; position: relative; }
    .track-wave canvas { width: 100%; height: 100%; display: block; }

    /* 再生ライン */
    .playhead-line {
      position: absolute; top: 0; bottom: 0; width: 2px;
      background: #fff; box-shadow: 0 0 6px rgba(255,255,255,0.5);
      border-radius: 1px; pointer-events: none; left: 0;
      transform: translateX(-50%); transition: opacity 0.15s; opacity: 0;
    }
    .playhead-line.visible { opacity: 1; }
    .playhead-drag-zone {
      position: absolute; top: 0; bottom: 0; width: 20px;
      transform: translateX(-50%); cursor: ew-resize; left: 0; z-index: 10; opacity: 0;
    }

    .track-vol {
      -webkit-appearance: none; appearance: none;
      width: 72px; height: 4px; border-radius: 2px;
      background: var(--surface3); cursor: pointer;
    }
    .track-vol::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px;
      border-radius: 50%; background: var(--text); cursor: pointer;
    }
    .track-btns { display: flex; gap: 6px; }
    .track-btn {
      border-radius: 20px;
      border: 1px solid var(--surface3);
      background: transparent;
      color: var(--text-muted);
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px; cursor: pointer;
      transition: all 0.15s;
    }
    .track-btn:hover { border-color: var(--text); color: var(--text); }
    .track-btn.solo-on { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .track-btn.mute-on { background: rgba(248,113,113,0.1); border-color: #f87171; color: #f87171; }

    /* Loading overlay */
    #loading-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; z-index: 100; font-size: 14px; color: var(--text-muted);
    }
    #loading-overlay.hidden { display: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--surface3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .player-body { grid-template-columns: 1fr; padding: 12px 16px 40px; }
      .player-right { position: static; flex-direction: row; flex-wrap: wrap; }
      .song-jacket { width: 140px; aspect-ratio: 1; flex-shrink: 0; }
      .player-links { flex-direction: row; flex-wrap: wrap; }
      .link-btn { padding: 8px 14px; font-size: 12px; }
    }
    @media (max-width: 600px) {
      .song-grid { padding: 0 16px 60px; grid-template-columns: 1fr 1fr; }
      .list-hero { padding: 32px 16px 24px; }
      .track-row { grid-template-columns: 80px 1fr; grid-template-rows: auto auto; height: auto; gap: 8px; }
      .track-wave { grid-column: 1 / -1; height: 28px; }
      .track-vol { width: 56px; }
      .player-header { padding: 12px 16px; }
      .player-right { flex-direction: column; }
      .song-jacket { width: 100%; }
      .list-header { padding: 16px; }
    }
  </style>
</head>
<body>

<div id="loading-overlay" class="hidden">
  <div class="spinner"></div>
  <span id="loading-msg">読み込み中…</span>
</div>

<!-- 再開オーバーレイ -->
<div id="resume-overlay" class="hidden">
  <p>バックグラウンドから戻りました</p>
  <button id="resume-btn">▶</button>
  <p style="font-size:13px;">タップして再開</p>
</div>

<!-- ── LIST SCREEN ── -->
<div id="list-screen" class="screen active">
  <header class="list-header">
    <p class="site-logo">Stem Player</p>
  </header>
  <div class="list-hero">
    <h1>Listen in Layers.</h1>
    <p>各楽曲のステムを自由にソロ・ミュートして、音楽の構造を体感してください。</p>
  </div>
  <div class="empty-state" id="empty-state">まだ楽曲がありません。</div>
  <div class="song-grid" id="song-grid"></div>
</div>

<!-- ── PLAYER SCREEN ── -->
<div id="player-screen" class="screen">
  <header class="player-header">
    <p class="player-header-logo">Stem Player</p>
    <div class="player-title-wrap">
      <p class="player-song-title" id="player-song-title">—</p>
      <p class="player-stem-count" id="player-stem-count"></p>
    </div>
    <button class="back-btn" id="back-btn">← 一覧に戻る</button>
  </header>

  <div class="player-body">
    <!-- 左：トランスポート + ステムトラック -->
    <div class="player-left">
      <div class="transport">
        <div class="seek-wrapper">
          <span class="time-label" id="time-current">0:00</span>
          <input type="range" class="seek-bar" id="seek-bar" min="0" max="1000" value="0" step="1" />
          <span class="time-label" id="time-total">0:00</span>
        </div>
        <div class="transport-btns">
          <button class="ctrl-btn" id="all-on-btn">ALL ON</button>
          <button class="ctrl-btn" id="all-off-btn">ALL OFF</button>
          <button class="play-btn" id="play-btn">▶</button>
          <button class="ctrl-btn" id="loop-btn">LOOP</button>
        </div>
        <div class="master-vol-wrap">
          <span class="master-vol-label">MASTER VOL</span>
          <input type="range" class="master-vol-bar" id="master-vol" min="0" max="1" step="0.01" value="1" />
          <span class="master-vol-val" id="master-vol-val">100%</span>
        </div>
      </div>
      <div class="tracks-area" id="tracks-area"></div>
    </div>

    <!-- 右：ジャケット・説明・リンク -->
    <div class="player-right">
      <div class="song-jacket" id="song-jacket">
        <div class="song-jacket-placeholder">
          <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
        </div>
      </div>
      <div class="song-description" id="song-description" style="display:none;"></div>
      <div class="player-links" id="player-links"></div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════
   CONFIG — songs.json の場所
═══════════════════════════════════════ */
const SONGS_JSON_URL = './songs.json';

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
let songs = [];
let audioCtx = null;
let masterGain = null;
const tracks = [];
let isPlaying = false;
let startTime = 0;
let pauseOffset = 0;
let duration = 0;
let rafId = null;
let looping = false;
let soloActive = false;

/* ═══════════════════════════════════════
   BOOT
═══════════════════════════════════════ */
(async () => {
  showLoading(true, '楽曲リストを読み込んでいます…');
  try {
    const r = await fetch(SONGS_JSON_URL + '?_=' + Date.now());
    songs = await r.json();
  } catch(e) {
    songs = [];
  }
  renderSongList();
  showLoading(false);
})();

/* ═══════════════════════════════════════
   SONG LIST
═══════════════════════════════════════ */
function renderSongList() {
  const grid = document.getElementById('song-grid');
  const empty = document.getElementById('empty-state');
  grid.innerHTML = '';
  if (!songs.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  songs.forEach((song, idx) => {
    const card = document.createElement('div');
    card.className = 'song-card';
    card.innerHTML = `
      <div class="song-card-art">
        ${song.artwork
          ? `<img src="${song.artwork}" alt="${song.title}" loading="lazy" />`
          : `<div class="song-card-art-placeholder"><svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg></div>`
        }
        <div class="play-overlay"><div class="play-overlay-icon">▶</div></div>
      </div>
      <p class="song-card-title">${song.title}</p>
      <div class="song-card-meta">
        ${song.artist ? `<span>${song.artist}</span>` : ''}
        <span class="song-card-tag">${song.stems.length} stems</span>
      </div>`;
    card.addEventListener('click', () => openPlayer(idx));
    grid.appendChild(card);
  });
}

/* ═══════════════════════════════════════
   OPEN PLAYER
═══════════════════════════════════════ */
async function openPlayer(songIdx) {
  const song = songs[songIdx];
  showLoading(true, `「${song.title}」を読み込んでいます…`);

  stopPlayback();
  tracks.length = 0;
  if (audioCtx) { await audioCtx.close(); }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = +document.getElementById('master-vol').value;
  masterGain.connect(audioCtx.destination);

  for (let i = 0; i < song.stems.length; i++) {
    const stem = song.stems[i];
    document.getElementById('loading-msg').textContent =
      `読み込み中… (${i+1}/${song.stems.length}) ${stem.name}`;
    try {
      const resp = await fetch(stem.file);
      const ab   = await resp.arrayBuffer();
      const buf  = await audioCtx.decodeAudioData(ab);
      const gain = audioCtx.createGain();
      gain.connect(masterGain);  // → masterGain → destination
      tracks.push({ name: stem.name, buffer: buf, source: null, gainNode: gain, muted: false, soloed: false, vol: 1 });
    } catch(e) {
      console.error('decode error', stem.name, e);
    }
  }

  if (!tracks.length) { showLoading(false); alert('ステムを読み込めませんでした。'); return; }
  duration = Math.max(...tracks.map(t => t.buffer.duration));

  document.getElementById('player-song-title').textContent = song.title;
  document.getElementById('player-stem-count').textContent = `${tracks.length} stems`;
  buildPlayerUI();
  drawAllWaveforms();
  renderPlayerLinks(song);

  pauseOffset = 0;
  isPlaying = false;

  showScreen('player-screen');
  showLoading(false);
}

/* ═══════════════════════════════════════
   PLAYER LINKS + JACKET + DESCRIPTION
═══════════════════════════════════════ */
function renderPlayerLinks(song) {
  // ジャケット
  const jacket = document.getElementById('song-jacket');
  if (song.artwork) {
    jacket.innerHTML = `<img src="${song.artwork}" alt="${song.title}" />`;
  } else {
    jacket.innerHTML = `<div class="song-jacket-placeholder"><svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg></div>`;
  }

  // 楽曲説明
  const desc = document.getElementById('song-description');
  if (song.description) {
    desc.textContent = song.description;
    desc.style.display = '';
  } else {
    desc.style.display = 'none';
  }

  // リンクボタン
  const area = document.getElementById('player-links');
  area.innerHTML = '';
  const links = song.links || {};
  const defs = [
    { key: 'purchase',   cls: 'purchase',   icon: '🛒', label: 'ステム購入' },
    { key: 'streaming',  cls: 'streaming',  icon: '🎵', label: '配信で聴く' },
    { key: 'youtube',    cls: 'youtube',    icon: '▶', label: 'YouTube' },
    { key: 'instagram',  cls: 'instagram',  icon: '📷', label: 'Instagram' },
    { key: 'twitter',    cls: 'twitter',    icon: '𝕏', label: 'X (Twitter)' },
  ];
  defs.forEach(d => {
    if (!links[d.key]) return;
    const a = document.createElement('a');
    a.href = links[d.key];
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.className = `link-btn ${d.cls}`;
    a.innerHTML = `<span>${d.icon}</span><span>${d.label}</span>`;
    area.appendChild(a);
  });
}
function buildPlayerUI() {
  document.getElementById('time-total').textContent = formatTime(duration);
  document.getElementById('seek-bar').value = 0;
  document.getElementById('play-btn').textContent = '▶';
  document.getElementById('loop-btn').classList.remove('active');
  document.getElementById('master-vol').value = 1;
  document.getElementById('master-vol-val').textContent = '100%';
  looping = false;
  soloActive = false;

  const area = document.getElementById('tracks-area');
  area.innerHTML = '';
  tracks.forEach((t, i) => {
    const row = document.createElement('div');
    row.className = 'track-row';
    row.id = `track-row-${i}`;
    row.innerHTML = `
      <span class="track-name">${t.name}</span>
      <div class="track-wave" id="tw-${i}"><canvas id="wave-${i}"></canvas><div class="playhead-line" id="ph-${i}"></div><div class="playhead-drag-zone" id="pdz-${i}"></div></div>
      <input type="range" class="track-vol" min="0" max="1" step="0.01" value="1" data-i="${i}" />
      <div class="track-btns">
        <button class="track-btn" id="solo-btn-${i}" data-i="${i}">SOLO</button>
        <button class="track-btn" id="mute-btn-${i}" data-i="${i}">MUTE</button>
      </div>`;
    area.appendChild(row);
  });

  area.querySelectorAll('.track-vol').forEach(sl => {
    sl.addEventListener('input', () => {
      tracks[+sl.dataset.i].vol = +sl.value;
      applyGain(+sl.dataset.i);
    });
  });
  tracks.forEach((_, i) => {
    document.getElementById(`solo-btn-${i}`).addEventListener('click', () => toggleSolo(i));
    document.getElementById(`mute-btn-${i}`).addEventListener('click', () => toggleMute(i));
  });

  // 波形ドラッグによるシーク
  tracks.forEach((_, i) => {
    const tw  = document.getElementById(`tw-${i}`);
    const pdz = document.getElementById(`pdz-${i}`);
    if (!tw || !pdz) return;

    function getClickPct(e) {
      const rect = tw.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      return Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    }

    function onDragMove(e) {
      e.preventDefault();
      const pct = getClickPct(e);
      pauseOffset = pct * duration;
      seekBar.value = pct * 1000;
      document.getElementById('time-current').textContent = formatTime(pauseOffset);
      setPlayheadPct(pct);
    }

    let wasPlyaing = false;
    function onDragEnd(e) {
      document.removeEventListener('mousemove', onDragMove);
      document.removeEventListener('mouseup',   onDragEnd);
      document.removeEventListener('touchmove', onDragMove);
      document.removeEventListener('touchend',  onDragEnd);
      const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
      const rect = tw.getBoundingClientRect();
      const pct  = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
      pauseOffset = pct * duration;
      if (wasPlyaing) startPlayback(pauseOffset);
    }

    tw.addEventListener('mousedown', e => {
      if (tw.contains(e.target)) {
        wasPlyaing = isPlaying;
        if (isPlaying) pausePlayback();
        const pct = getClickPct(e);
        pauseOffset = pct * duration;
        setPlayheadPct(pct);
        seekBar.value = pct * 1000;
        document.getElementById('time-current').textContent = formatTime(pauseOffset);
        document.addEventListener('mousemove', onDragMove);
        document.addEventListener('mouseup',   onDragEnd);
      }
    });
    tw.addEventListener('touchstart', e => {
      wasPlyaing = isPlaying;
      if (isPlaying) pausePlayback();
      const pct = getClickPct(e);
      pauseOffset = pct * duration;
      setPlayheadPct(pct);
      seekBar.value = pct * 1000;
      document.getElementById('time-current').textContent = formatTime(pauseOffset);
      document.addEventListener('touchmove', onDragMove, {passive:false});
      document.addEventListener('touchend',  onDragEnd);
    }, {passive:true});
  });
}

function drawAllWaveforms() {
  tracks.forEach((t, i) => {
    const canvas = document.getElementById(`wave-${i}`);
    if (!canvas) return;
    canvas.width  = canvas.parentElement.clientWidth  || 400;
    canvas.height = canvas.parentElement.clientHeight || 40;
    drawWaveform(canvas, t.buffer);
  });
}

function drawWaveform(canvas, buffer) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const data = buffer.getChannelData(0);
  const step = Math.ceil(data.length / W);
  const mid  = H / 2;
  ctx.clearRect(0, 0, W, H);
  const grad = ctx.createLinearGradient(0, 0, W, 0);
  grad.addColorStop(0, 'rgba(29,185,84,0.8)');
  grad.addColorStop(1, 'rgba(30,215,96,0.6)');
  ctx.fillStyle = grad;
  for (let x = 0; x < W; x++) {
    let max = 0;
    for (let s = 0; s < step; s++) {
      const v = Math.abs(data[x * step + s] || 0);
      if (v > max) max = v;
    }
    const h = Math.max(2, max * mid * 1.8);
    ctx.fillRect(x, mid - h, 1, h * 2);
  }
}

/* ═══════════════════════════════════════
   PLAYBACK
═══════════════════════════════════════ */
function startPlayback(offset = 0) {
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  tracks.forEach(t => {
    const src = audioCtx.createBufferSource();
    src.buffer = t.buffer;
    src.loop = looping;
    src.connect(t.gainNode);
    src.start(0, offset % duration);
    t.source = src;
    src.onended = () => { if (!isPlaying || looping) return; endPlayback(); };
  });
  startTime = audioCtx.currentTime - offset;
  isPlaying = true;
  document.getElementById('play-btn').textContent = '⏸';
  rafId = requestAnimationFrame(updateSeek);
}
function hidePlayheads() {
  tracks.forEach((_, i) => {
    const ph = document.getElementById(`ph-${i}`);
    if (ph) ph.classList.remove('visible');
  });
}
function setPlayheadPct(pct) {
  tracks.forEach((_, i) => {
    const ph = document.getElementById(`ph-${i}`);
    if (!ph) return;
    ph.classList.add('visible');
    ph.style.left = (pct * 100) + '%';
  });
}
function pausePlayback() {
  pauseOffset = audioCtx.currentTime - startTime;
  tracks.forEach(t => { try { t.source?.stop(); } catch(e){} t.source = null; });
  isPlaying = false;
  cancelAnimationFrame(rafId);
  document.getElementById('play-btn').textContent = '▶';
}
function stopPlayback() {
  if (!audioCtx) return;
  pauseOffset = 0;
  tracks.forEach(t => { try { t.source?.stop(); } catch(e){} t.source = null; });
  isPlaying = false;
  cancelAnimationFrame(rafId);
  hidePlayheads();
}
function endPlayback() {
  isPlaying = false; pauseOffset = 0;
  cancelAnimationFrame(rafId);
  document.getElementById('play-btn').textContent = '▶';
  document.getElementById('seek-bar').value = 0;
  document.getElementById('time-current').textContent = '0:00';
  hidePlayheads();
}

document.getElementById('play-btn').addEventListener('click', () => {
  if (!tracks.length) return;
  isPlaying ? pausePlayback() : startPlayback(pauseOffset);
});

/* master volume */
document.getElementById('master-vol').addEventListener('input', function() {
  const v = +this.value;
  document.getElementById('master-vol-val').textContent = Math.round(v * 100) + '%';
  if (masterGain) masterGain.gain.setTargetAtTime(v, audioCtx.currentTime, 0.02);
});

/* seek */
const seekBar = document.getElementById('seek-bar');
let seeking = false;
seekBar.addEventListener('mousedown', () => { seeking = true; if (isPlaying) pausePlayback(); });
seekBar.addEventListener('touchstart', () => { seeking = true; if (isPlaying) pausePlayback(); }, {passive:true});
seekBar.addEventListener('input', () => {
  const pct = +seekBar.value / 1000;
  document.getElementById('time-current').textContent = formatTime(pct * duration);
  setPlayheadPct(pct);
});
seekBar.addEventListener('change', () => {
  pauseOffset = (+seekBar.value / 1000) * duration;
  seeking = false;
  startPlayback(pauseOffset);
});
function updateSeek() {
  if (!isPlaying || seeking) return;
  const elapsed = audioCtx.currentTime - startTime;

  // ループ折り返し
  if (looping && elapsed >= duration) {
    pausePlayback();
    startPlayback(0);
    return;
  }

  const pct = Math.min(elapsed / duration, 1);
  seekBar.value = pct * 1000;
  document.getElementById('time-current').textContent = formatTime(elapsed);

  // 各トラックの再生ラインを更新
  tracks.forEach((_, i) => {
    const ph = document.getElementById(`ph-${i}`);
    if (!ph) return;
    ph.classList.add('visible');
    ph.style.left = (pct * 100) + '%';
  });

  if (pct < 1) rafId = requestAnimationFrame(updateSeek);
  else if (!looping) endPlayback();
}

/* mute/solo */
function applyGain(i) {
  const t = tracks[i];
  const eff = t.muted || (soloActive && !t.soloed);
  t.gainNode.gain.setTargetAtTime(eff ? 0 : t.vol, audioCtx?.currentTime || 0, 0.02);
}
function updateAllGains() {
  soloActive = tracks.some(t => t.soloed);
  tracks.forEach((_, i) => applyGain(i));
  tracks.forEach((t, i) => {
    const row = document.getElementById(`track-row-${i}`);
    if (!row) return;
    row.classList.toggle('is-muted', t.muted);
    row.classList.toggle('is-solo', t.soloed);
    row.classList.toggle('solo-dimmed', soloActive && !t.soloed && !t.muted);
  });
}
function toggleMute(i) {
  tracks[i].muted = !tracks[i].muted;
  document.getElementById(`mute-btn-${i}`).classList.toggle('mute-on', tracks[i].muted);
  updateAllGains();
}
function toggleSolo(i) {
  tracks[i].soloed = !tracks[i].soloed;
  document.getElementById(`solo-btn-${i}`).classList.toggle('solo-on', tracks[i].soloed);
  updateAllGains();
}

document.getElementById('all-on-btn').addEventListener('click', () => {
  tracks.forEach((t, i) => {
    t.muted = false; t.soloed = false;
    document.getElementById(`mute-btn-${i}`).classList.remove('mute-on');
    document.getElementById(`solo-btn-${i}`).classList.remove('solo-on');
  });
  updateAllGains();
});
document.getElementById('all-off-btn').addEventListener('click', () => {
  tracks.forEach((t, i) => {
    t.muted = true;
    document.getElementById(`mute-btn-${i}`).classList.add('mute-on');
    document.getElementById(`solo-btn-${i}`).classList.remove('solo-on');
    t.soloed = false;
  });
  updateAllGains();
});
document.getElementById('loop-btn').addEventListener('click', () => {
  looping = !looping;
  document.getElementById('loop-btn').classList.toggle('active', looping);
  tracks.forEach(t => { if (t.source) t.source.loop = looping; });
});

/* back */
document.getElementById('back-btn').addEventListener('click', () => {
  stopPlayback();
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  showScreen('list-screen');
});

/* ═══════════════════════════════════════
   HELPERS
═══════════════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function formatTime(sec) {
  if (!isFinite(sec)) return '0:00';
  const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2,'0')}`;
}
function showLoading(v, msg) {
  const el = document.getElementById('loading-overlay');
  el.classList.toggle('hidden', !v);
  if (msg) document.getElementById('loading-msg').textContent = msg;
}

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(drawAllWaveforms, 200);
});

/* ── モバイル対応：バックグラウンドから戻った時に再開オーバーレイを表示 ── */
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') {
    if (isPlaying && audioCtx) {
      pauseOffset = audioCtx.currentTime - startTime;
      pausePlayback();
    }
  }
  if (document.visibilityState === 'visible' && audioCtx && pauseOffset > 0) {
    // プレイヤー画面が表示中なら再開オーバーレイを出す
    if (document.getElementById('player-screen').classList.contains('active')) {
      document.getElementById('resume-overlay').classList.remove('hidden');
    }
  }
});

window.addEventListener('pageshow', () => {
  if (audioCtx && pauseOffset > 0) {
    if (document.getElementById('player-screen').classList.contains('active')) {
      document.getElementById('resume-overlay').classList.remove('hidden');
    }
  }
});

document.getElementById('resume-btn').addEventListener('click', async () => {
  document.getElementById('resume-overlay').classList.add('hidden');
  if (audioCtx && audioCtx.state === 'suspended') {
    await audioCtx.resume();
  }
  startPlayback(pauseOffset);
});

document.getElementById('play-btn').addEventListener('touchstart', async () => {
  if (audioCtx && audioCtx.state === 'suspended') {
    await audioCtx.resume();
  }
}, { passive: true });
</script>
